# Cloudflare Pages configuration
# https://developers.cloudflare.com/pages/configuration/

[build]
  # No build step — static files + Functions
  command = ""
  destination = "."

[[kv_namespaces]]
  # Bind a KV namespace for rate limiting
  # Create it in CF dashboard: Workers & Pages → KV → Create namespace → name it "RATE_LIMIT_KV"
  binding = "RATE_LIMIT_KV"
  # id = "PASTE_YOUR_KV_NAMESPACE_ID_HERE"
  # preview_id = "PASTE_YOUR_KV_PREVIEW_ID_HERE"
